name: Python tests

on:
  push:
    branches: [ main ]
    tags-ignore:
      - 'v*'    # taken care of in python-package.yml
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    # Skip if commit is from github-actions bot (version updates)
    if: github.actor != 'github-actions[bot]'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
       python -m pip install --upgrade pip
       python -m pip install pytest "numpy>=2.4.0,<3"
       python -m pip install "juliacall>=0.9.30,<0.10"
       python -m pip install .
    - name: Verify Julia setup
      run: |
        python -c "import juliacall; print('Julia setup successful')"
    - name: Test with pytest
      run: |
        pytest
